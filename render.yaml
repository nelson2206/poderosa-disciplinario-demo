services:
  - type: web
    name: poderosa-disciplinario
    runtime: node
    plan: free               # 750 h/mes gratis; duerme tras 15 min de inactividad
    region: oregon
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: OPENAI_API_KEY
        sync: false           # Se introduce en el dashboard de Render, nunca en git
      - key: OPENAI_MODEL
        value: gpt-5
      # Overrides opcionales por endpoint (baja coste delegando lo liviano).
      # Descoméntalos en el dashboard de Render si quieres delegar las tareas
      # livianas (OCR, clasificación) a modelos más baratos.
      # - key: OPENAI_MODEL_CLASSIFIER
      #   value: gpt-5-mini
      # - key: OPENAI_MODEL_VISION
      #   value: gpt-4o
      - key: ALLOW_ORIGIN
        value: "*"             # Restringir cuando se tenga dominio final
      - key: STATIC_DIR
        value: ..              # Express sirve index.html desde la raíz del repo
      # Backend Supabase (recomendado): defínelos en el dashboard de Render.
      # Si quedan vacíos, el server usa filesystem (server/data, efímero).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Token de acceso al API. Por defecto se autogenera, pero está
      # DESACTIVADO mediante POD_AUTH_OFF=1 abajo (para una demo compartible
      # sin que los usuarios tengan que pegar nada). Para reactivar auth,
      # quita POD_AUTH_OFF y rota POD_API_TOKEN.
      - key: POD_API_TOKEN
        generateValue: true
      # Mientras esté en "1", el middleware requireToken deja pasar todo
      # (rate-limit sigue activo: 15 generaciones/min, 120 req/min globales).
      - key: POD_AUTH_OFF
        value: "1"
      # Correo (SMTP) — OPCIONAL. Habilita el "envío directo desde la herramienta".
      # Mientras estén vacíos, /api/health reporta emailConfigured:false y el
      # frontend usa el borrador de Outlook (.eml). Defínelos en el dashboard de
      # Render (Microsoft 365: SMTP_HOST=smtp.office365.com, SMTP_PORT=587).
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_SECURE
      #   value: "0"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: SMTP_FROM
      #   sync: false
